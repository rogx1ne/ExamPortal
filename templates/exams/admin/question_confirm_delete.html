{% extends "base.html" %}
{% block title %}Delete Question{% endblock %}
{% block content %}
  <h2 class="mb-3">Delete Question</h2>
  <div class="alert alert-warning">
    Are you sure you want to delete this question?
    <div class="mt-2"><strong>{{ question.question_text }}</strong></div>
  </div>
  <form method="post">
    {% csrf_token %}
    <a class="btn btn-outline-secondary" href="{% url 'admin_question_list' exam_id=question.exam_id %}">Cancel</a>
    <button class="btn btn-danger" type="submit">Delete</button>
  </form>
{% endblock %}
